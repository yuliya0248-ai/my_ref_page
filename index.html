<!DOCTYPE html>
<html lang="ru">
<head>

    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;600;800&display=swap');

        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
    </style>
</head>
<body class="selection:bg-yellow-400 selection:text-black">
    <div id="root"></div>

                    {/* HERO SECTION */}
                    <section className="relative z-10 min-h-[100dvh] flex flex-col items-center justify-center px-4 text-center py-10 pb-16">

                                    <p className="text-gray-400 text-sm md:text-base leading-relaxed relative z-10 font-light">

                                </div>
                            </div>
                        </div>

                    <section id="contact-section" className="relative z-10 py-16 md:py-32 px-4 bg-white/[0.02] border-t border-white/5">
                        <div className="max-w-6xl mx-auto flex flex-col md:flex-row items-center justify-center gap-12 md:gap-24">
                            <div className="relative w-64 md:w-96 shrink-0">
                                <div className="absolute inset-0 bg-gradient-to-tr from-[#5D1B84]/40 to-yellow-400/40 blur-[60px] opacity-50"></div>
                                <img src="download.png" alt="Юлия Зернова" className="w-full h-auto object-contain relative z-10" />
                            </div>

                            <div className="max-w-xl text-center md:text-left">
                                <h2 className="text-3xl md:text-6xl font-black uppercase mb-6 leading-tight tracking-tighter text-white">Сделаем <br className="hidden md:block"/>хорошее дело?</h2>
                                <p className="text-gray-400 text-sm md:text-base leading-relaxed mb-10 font-light">

                                    <a href="https://t.me/ya_yuuliya" target="_blank" class="flex items-center justify-center gap-4 bg-sky-600/20 border border-sky-600/40 text-sky-400 py-4 px-8 rounded-2xl font-bold uppercase text-[10px] tracking-widest shadow-lg hover:bg-sky-600 hover:text-white transition-all active:scale-95"><IconSend size={18}/> Telegram</a>

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
